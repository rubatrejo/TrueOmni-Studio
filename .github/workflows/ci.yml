name: CI

# Pre-flight checks en cada PR a main y en cada push a main.
# - `check`: typecheck + lint + format (rápido, < 1 min).
# - `build`: Next.js production build (~3 min).
#
# E2E queda fuera de CI: se corre local con `agent-browser batch < tests/e2e/*.json`
# (toolchain oficial — ver tests/e2e/README.md). Si la suite crece > 10 specs,
# evaluar reactivar Playwright (CLAUDE.md sección 9).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela runs previos del mismo PR/branch para ahorrar minutos.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck · Lint · Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (KIOSK_CLIENT=default)
        env:
          KIOSK_CLIENT: default
          # Build no necesita KV real — los endpoints de Studio son `force-dynamic`.
          # Variables placeholder para que zod no falle en module-level reads.
          KV_REST_API_URL: https://stub.local
          KV_REST_API_TOKEN: stub-token
          NEXTAUTH_SECRET: ci-stub-secret-not-used-at-runtime
          NEXTAUTH_URL: http://localhost:3000
        run: pnpm build
